name: Cancel
on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Workflow run ID to cancel'
        required: true
        type: string
jobs:
  cancel:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Cancel workflow run
        run: |
          set -euo pipefail
          run_id="${{ github.event.inputs.run_id }}"
          if [ -z "$run_id" ]; then
            echo "run_id is required"
            exit 1
          fi
          curl -X POST -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/${{ github.repository_owner }}/${{ github.event.repository.name }}/actions/runs/${run_id}/cancel"
